name: build
on:
  workflow_dispatch:
  push:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    #container:
    #  image: us-central1-docker.pkg.dev/tensorflow-sigs/tensorflow/ml-build:latest
    #timeout-minutes: 60
    #strategy:
    #  matrix:
    #    docker-python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: |
          git config --global --add safe.directory ${GITHUB_WORKSPACE}
          git config --global --add safe.directory ${GITHUB_WORKSPACE}/third_party/tensorflow
          git submodule update --init --recursive
          git submodule update --remote
          apt-get update && sudo apt-get install -y llvm-17 clang-17
          # Run configure.
          #cd ./third_party/tensorflow
          #echo -e "/usr/bin/python3\/usr/lib/python3/dist-packages\N\N\Y\/usr/lib/llvm-18/bin/clang\-Wno-sign-compare -Wno-c++20-designator -Wno-gnu-inline-cpp-without-extern\N" | ./configure
          #cp .tf_configure.bazelrc ${GITHUB_WORKSPACE}
          bazel build //tflite/java:tensorflowlitelib_stable
          find -name *.jar
          ls -l bazel-bin/tflite/java
      - name: publish
        run: |
          echo -n "${{ secrets.GPG_KEY}}" | base64 -d | gpg --import
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>central</id><username>${{ secrets.MAVEN_USERNAME }}</username><password>${{ secrets.MAVEN_PASSWORD }}</password></server></servers></settings>' >~/.m2/settings.xml
          mvn -P release --batch-mode deploy -DskipTests
        env:
          GPG_KEY: ${{ secrets.GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ""
